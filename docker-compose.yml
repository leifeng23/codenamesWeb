services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: cosmere
      POSTGRES_PASSWORD: cosmere
      POSTGRES_DB: cosmere_codenames
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cosmere -d cosmere_codenames"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://cosmere:cosmere@postgres:5432/cosmere_codenames?schema=public
      REDIS_URL: redis://redis:6379
      NEXT_PUBLIC_REALTIME_URL: ${PUBLIC_REALTIME_URL:-http://localhost:4001}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3000:3000"

  realtime:
    build:
      context: .
      dockerfile: apps/realtime/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://cosmere:cosmere@postgres:5432/cosmere_codenames?schema=public
      REDIS_URL: redis://redis:6379
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:3000}
      REALTIME_PORT: 4001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "4001:4001"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    profiles: ["production"]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - realtime

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
